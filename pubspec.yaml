name: my_youtube
description: "Track the latest videos from your favourite YouTube channels and save links."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.2
  xml: ^6.5.0
  webview_flutter: ^4.9.0
  webview_flutter_android: ^4.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FF0000"
  adaptive_icon_foreground: "assets/icon/foreground.png"

flutter:
  uses-material-design: true
